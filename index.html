<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>張竣喆 | Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="split-layout">
      <div class="left-panel">
        <img src="images/avatar.png" alt="頭像" class="avatar" />
        <h1>張竣喆</h1>
        <h2>關於我</h2>
        <p>
          我專注於當代油畫創作，探索自然與人類情感的交會點。每一張畫布都在講述一個故事，融合色彩與紋理來捕捉純粹感受的瞬間。
        </p>
      </div>

      <div class="right-panel">
        <img
          src="images/painting_1.jpg"
          alt="畫作 1"
          class="gallery-image active"
        />
        <img src="images/painting_2.jpg" alt="畫作 2" class="gallery-image" />

        <div class="gallery-controls">
          <button id="prevBtn">Prev</button>
          <button id="nextBtn">Next</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
